server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    # NOTE: In Kubernetes, the backend service is 'fintech-backend-stable'.
    #       In Docker Compose, it was 'backend'. Use an env-agnostic variable
    #       via NGINX_BACKEND_HOST so one image works in both environments.
    location /api {
        proxy_pass http://fintech-backend-stable:5000/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Special handling for Server-Sent Events (SSE) stream to prevent Nginx buffering
    location /api/transactions/stream {
        proxy_pass http://fintech-backend-stable:5000/api/transactions/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Cache-Control no-cache;
        proxy_set_header X-Accel-Buffering no; # Disable buffering for SSE in Nginx
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 24h;
    }
}
